<!DOCTYPE html>
<html lang="en">
    <head>

        <!-- Basic meta tags -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="A practice website, restaurant themed.">
        <meta name="keywords" content="Restaurant, Tasty, Food, Menu">
        <title>Tasty Bites</title>

        <!-- Open Graph tags -->
        <meta property="og:title" content="Tasty Bites">
        <meta property="og:description" content="Order now to get your hands on some tasty bites!">

        <!-- Styles -->
        <link rel="stylesheet" href="/styles.css">

        <!-- JavaScript -->
        <script type="module" src="/main.js"></script>
    </head>
    <body>
        <header class="site-header">

            <!-- 
                We wrap all the site-header content so we can assign it a maximum width
                while also being able to have auto-margin on the content-box.

                site-header needs to span the whole document for the background color 
                so it cannot have margin.
              -->
            <div class="site-header__content-box">
                <div class="site-header__title-box site-header__flex-item">

                    <!-- 
                        This div is here so that the title-box can flex
                        the title and description as one item instead of
                        both seperately.
                    -->
                    <div class="site-title__group">
                        <h1 class="site-title">Tasty Bites</h1>
                        <p class="site-title__desc">Good food, Great mood.</p>
                    </div>
                </div>
                <nav class="site-nav site-header__flex-item">
                    <ul class="site-nav__list ">
                        <li class="site-nav__item">
                            <a class="site-nav__link" href="/">Home</a>
                        </li>
                        <li class="site-nav__item">
                            <a class="site-nav__link" href="/">Menu</a>
                        </li>
                        <li class="site-nav__item">
                            <a class="site-nav__link" href="/">About</a>
                        </li>
                        <li class="site-nav__item">
                            <a class="site-nav__link" href="/">Contact</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>
        <main class="main">

            <!-- Menu section -->
            <section class="menu">
                <header class="menu-header">
                    <h2 class="menu-header__title">Our Menu</h2>

                    <!-- Filter buttons -->
                    <ul class="filter-list">
                        <li class="filter-list__item">
                            <button type="button" aria-pressed="true" data-filter="all" class="filter-button filter-button--active">All</button>
                        </li>
                        <li class="filter-list__item">
                            <button type="button" aria-pressed="false" data-filter="breakfast" class="filter-button">Breakfast</button>
                        </li>
                        <li class="filter-list__item">
                            <button type="button" aria-pressed="false" data-filter="lunch" class="filter-button">Lunch</button>
                        </li>
                        <li class="filter-list__item">
                            <button type="button" aria-pressed="false" data-filter="dinner" class="filter-button">Dinner</button>
                        </li>
                        <li class="filter-list__item">
                            <button type="button" aria-pressed="false" data-filter="dessert" class="filter-button">Desserts</button>
                        </li>
                        <li class="filter-list__item">
                            <button type="button" aria-pressed="false" data-filter="drink" class="filter-button">Drinks</button>
                        </li>
                    </ul>
                </header>

                <!-- Menu items -->
                <div class="menu__grid">
                </div>
            </section>
        </main>
        <footer>
            <p>Created by Kaedin Wilken &copy;</p>
        </footer>
    </body>
</html>
